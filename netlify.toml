[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    # Allow this site to be embedded as an iframe from any origin
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"

# SPA fallback — send all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
